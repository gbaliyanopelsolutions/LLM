<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM survey</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --bg: #0c0f14;
      --bg-elevated: #12171f;
      --bg-soft: #181e28;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8edf5;
      --muted: #8b96a8;
      --accent: #5b8cff;
      --accent-soft: rgba(91, 140, 255, 0.15);
      --danger: #f87171;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --transition: 0.22s ease;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, rgba(91, 140, 255, 0.12), transparent),
                  radial-gradient(900px 500px at 90% 0%, rgba(139, 92, 246, 0.08), transparent),
                  var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.5vw, 1.5rem);
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0;
      font-size: 0.875rem;
      color: var(--muted);
      max-width: 42ch;
    }

    /* Prompt full width on top; preview + source stacked below (single column). */
    .layout {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: stretch;
      width: 100%;
    }

    .panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
      animation: fadeUp 0.55s ease 0.06s both;
    }

    .panel__head {
      padding: 0.75rem 1rem;
      font-size: 0.72rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .panel__subhead {
      padding: 0.5rem 1rem 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }

    .field {
      padding: 0 1rem;
    }

    label.field-label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 0.75rem 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    textarea:focus {
      outline: none;
      border-color: rgba(91, 140, 255, 0.55);
      box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.18);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem 1rem 1rem;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.55rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow var(--transition), background var(--transition);
      font-family: inherit;
    }

    .btn:active:not(:disabled) { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn--primary {
      background: linear-gradient(135deg, #5b8cff, #7c5cff);
      color: #fff;
      box-shadow: 0 8px 24px rgba(91, 140, 255, 0.35);
    }

    .btn--primary:hover:not(:disabled) {
      box-shadow: 0 10px 28px rgba(91, 140, 255, 0.45);
    }

    .btn--ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn--ghost:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.04);
    }

    .btn--small {
      padding: 0.35rem 0.65rem;
      font-size: 0.78rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.5rem 1rem 1rem;
      max-height: 120px;
      overflow-y: auto;
    }

    .chip {
      font-size: 0.75rem;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      cursor: pointer;
      max-width: 100%;
      transition: background var(--transition), color var(--transition);
      font-family: inherit;
    }

    .chip:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }

    .muted.small {
      margin: 0;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Preview on top, source below — full width (no side-by-side columns). */
    .split {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 420px;
      flex: 1;
    }

    .subpanel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-bottom: 1px solid var(--border);
    }

    .subpanel:last-child {
      border-bottom: none;
    }

    .subpanel--preview {
      flex: 1 1 auto;
      min-height: 300px;
    }

    .subpanel--source {
      flex: 1 1 auto;
      min-height: 0;
      transition: flex-basis 0.28s ease;
    }

    .panel__head--split {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    .panel__head-title {
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      color: inherit;
    }

    .btn-source-toggle {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .btn-source-toggle:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-source-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .source-panel__body {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.32s ease;
    }

    .subpanel--source.is-collapsed .source-panel__body {
      grid-template-rows: 0fr;
    }

    .subpanel--source.is-collapsed {
      flex: 0 0 auto;
      min-height: 0;
    }

    .source-panel__inner {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .code-wrap {
      margin: 0;
      flex: 1;
      overflow: auto;
      padding: 0.75rem;
      background: #0a0d12;
    }

    .code-wrap code {
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
      font-size: 0.72rem;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
    }

    .toolbar .btn--primary {
      box-shadow: none;
      background: rgba(91, 140, 255, 0.2);
      color: var(--text);
      border: 1px solid rgba(91, 140, 255, 0.35);
    }

    .toolbar .btn--primary:hover:not(:disabled) {
      background: rgba(91, 140, 255, 0.3);
    }

    #preview {
      flex: 1;
      width: 100%;
      min-height: 320px;
      height: 100%;
      border: none;
      background: #fff;
    }

    .alert {
      margin: 0 0 1rem;
      padding: 0.65rem 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(248, 113, 113, 0.45);
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      font-size: 0.875rem;
      animation: shake 0.35s ease;
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: rgba(6, 8, 12, 0.72);
      backdrop-filter: blur(6px);
      transition: opacity var(--transition);
    }

    .loader[hidden] {
      display: none;
    }

    .loader__card {
      padding: 1.5rem 2rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 280px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent);
      animation: spin 0.85s linear infinite;
    }

    .loader__text {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    body.is-loading .panel {
      pointer-events: none;
      opacity: 0.92;
    }

    .toast {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      z-index: 99;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      animation: toastIn 0.35s ease;
    }

    .toast--error {
      border-color: rgba(248, 113, 113, 0.45);
      color: #fecaca;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>LLM survey</h1>
        <p>Describe any form — contact, survey, multi-step, login, checkout. Claude returns one complete HTML file.</p>
      </div>
    </header>

    <div id="err" class="alert" hidden role="alert"></div>

    <main class="layout">
      <section class="panel" aria-label="Prompt">
        <div class="panel__head">Prompt</div>

        <div class="field">
          <label class="field-label" for="prompt-input">Form requirement or follow-up</label>
          <textarea id="prompt-input" placeholder="e.g. Multi-step survey with progress bar and validation"></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btn btn--primary" id="generate-btn">Generate</button>
          <button type="button" class="btn btn--ghost" id="clear-history-btn">Clear history</button>
        </div>

        <div class="panel__subhead">Saved prompts</div>
        <div id="prompt-history" class="chips"></div>
      </section>

      <section class="panel" aria-label="Code and preview">
        <div class="split">
          <div class="subpanel subpanel--preview">
            <div class="panel__head">Live preview</div>
            <iframe id="preview" title="Live form preview" sandbox="allow-scripts allow-same-origin"></iframe>
          </div>
          <div class="subpanel subpanel--source" id="source-subpanel">
            <div class="panel__head panel__head--split">
              <span class="panel__head-title">Source</span>
              <button
                type="button"
                class="btn-source-toggle"
                id="source-toggle"
                aria-expanded="true"
                aria-controls="source-panel-body"
              >
                Hide source
              </button>
            </div>
            <div class="source-panel__body" id="source-panel-body">
              <div class="source-panel__inner">
                <pre class="code-wrap"><code id="code-block" class="language-html"></code></pre>
                <div class="toolbar">
                  <button type="button" class="btn btn--primary" id="copy-btn" disabled>Copy code</button>
                  <button type="button" class="btn btn--ghost" id="download-btn" disabled>Download HTML</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="loader" class="loader" hidden aria-busy="true">
    <div class="loader__card">
      <div class="spinner" aria-hidden="true"></div>
      <p class="loader__text">Generating your form…</p>
    </div>
  </div>

  <div id="toast" class="toast" hidden role="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
