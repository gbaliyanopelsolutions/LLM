<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="app-api-base" content="">
  <title>Add Company — Survey Form Builder</title>
  <link rel="stylesheet" href="/dash-shell.css">
  <script type="module" src="/shared/dashboard-sidebar.js"></script>
  <style>
    .company-form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      box-shadow: var(--shadow-sm);
      max-width: 600px;
      animation: dsiFadeUp 0.45s ease both;
    }

    .company-form-card h2 {
      margin: 0 0 0.35rem;
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em;
    }

    .company-form-card .lead {
      margin: 0 0 1.5rem;
      font-size: 0.82rem; color: var(--muted);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
    }

    .form-grid__full { grid-column: 1 / -1; }

    .field {
      display: flex; flex-direction: column; gap: 0.35rem;
    }

    .field label {
      font-size: 0.78rem; font-weight: 600; color: var(--muted);
    }

    .req-label { color: var(--danger); }

    .form-actions {
      display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1.35rem;
    }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .company-form-card { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="dash-overlay" id="sidebarOverlay"></div>

<div class="dash-shell">

  <!-- Sidebar Component: Renders at page-specific sidebar location -->
  <dashboard-sidebar current-page="add-company"></dashboard-sidebar>

  <!-- ════════ MAIN ════════ -->
  <div class="dash-content">
    <div class="dash-topbar">
      <div class="dash-topbar__left">
        <button class="dash-hamburger" id="hamburgerBtn" aria-label="Toggle sidebar" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div>
          <p class="dash-topbar__title">Companies</p>
          <p class="dash-topbar__sub">Register and manage companies</p>
        </div>
      </div>
      <div class="dash-topbar__right">
        <a class="dash-topbar-btn" href="/survey">View Surveys</a>
      </div>
    </div>

    <div class="dash-page">
      <div class="dash-page-header">
        <div>
          <h1>Add Company</h1>
          <p>Register a company to associate with your surveys.</p>
        </div>
      </div>

      <div class="company-form-card">
        <h2>Company details</h2>
        <p class="lead">Name and tier are required. Industry and region are optional.</p>

        <form id="company-form" novalidate>
          <div class="form-grid">
            <div class="field form-grid__full">
              <label for="company-name">Company name <span class="req-label">*</span></label>
              <input class="dsi-input" type="text" id="company-name" name="name" required autocomplete="organization" placeholder="e.g. Acme Corporation"/>
            </div>

            <div class="field">
              <label for="company-industry">Industry</label>
              <input class="dsi-input" type="text" id="company-industry" name="industry" list="industry-suggestions" placeholder="Type or pick a suggestion"/>
              <datalist id="industry-suggestions">
                <option value="Technology"></option>
                <option value="Healthcare"></option>
                <option value="Finance"></option>
                <option value="Retail"></option>
                <option value="Manufacturing"></option>
                <option value="Education"></option>
                <option value="Government"></option>
                <option value="Professional services"></option>
              </datalist>
            </div>

            <div class="field">
              <label for="company-region">Region</label>
              <input class="dsi-input" type="text" id="company-region" name="region" list="region-suggestions" placeholder="Type or pick a suggestion"/>
              <datalist id="region-suggestions">
                <option value="North America"></option>
                <option value="Europe"></option>
                <option value="Asia Pacific"></option>
                <option value="Middle East &amp; Africa"></option>
                <option value="Latin America"></option>
                <option value="India"></option>
                <option value="Global"></option>
              </datalist>
            </div>

            <div class="field form-grid__full">
              <label for="company-tier">Tier <span class="req-label">*</span></label>
              <select class="dsi-select" id="company-tier" name="tier" required>
                <option value="" disabled selected hidden>Select tier</option>
                <option value="Tier 1">Tier 1</option>
                <option value="Tier 2">Tier 2</option>
                <option value="Tier 3">Tier 3</option>
              </select>
            </div>
          </div>

          <p id="form-error" style="display:none;font-size:0.82rem;color:var(--danger);margin:0.5rem 0;" role="alert"></p>

          <div class="form-actions">
            <button type="submit" class="dsi-btn dsi-btn--primary" id="save-btn">Save company</button>
            <a class="dsi-btn dsi-btn--ghost" href="/survey">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="dsi-toast" hidden role="status"></div>
<div id="loader" hidden style="position:fixed;inset:0;background:rgba(245,247,255,0.7);backdrop-filter:blur(3px);z-index:300;display:grid;place-items:center;" aria-busy="true">
  <div class="dsi-spinner" style="width:32px;height:32px;border-width:3px;"></div>
</div>

<script type="module" src="/company.js"></script>
</body>
</html>
