<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="color-scheme" content="dark" />
	<title>Register — only_LLm</title>
	<link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-page">
	<main class="wrap">
		<h1>Create account</h1>
		<p class="sub">You will be signed in automatically after registration.</p>
		<div class="card">
			<p id="msg" class="err" role="alert"></p>
			<form id="form" novalidate>
				<label for="full_name">Full name</label>
				<input id="full_name" name="full_name" type="text" autocomplete="name" required minlength="2" />
				<label for="email">Email</label>
				<input id="email" name="email" type="email" autocomplete="email" required />
				<label for="password">Password (min 8 characters)</label>
				<input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" />
				<button type="submit" id="submit">Register</button>
			</form>
			<nav class="nav" aria-label="Related pages">
				<a href="/login">Already have an account?</a>
				<span class="sep" aria-hidden="true">·</span>
				<a href="/index">Form generator</a>
			</nav>
		</div>
	</main>
	<script>
	(function () {
		var form = document.getElementById('form');
		var msg = document.getElementById('msg');
		var submit = document.getElementById('submit');

		form.addEventListener('submit', async function (e) {
			e.preventDefault();
			msg.textContent = '';
			submit.disabled = true;
			var body = {
				full_name: document.getElementById('full_name').value.trim(),
				email: document.getElementById('email').value.trim(),
				password: document.getElementById('password').value,
			};
			try {
				var res = await fetch('/api/auth/register', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					credentials: 'same-origin',
					body: JSON.stringify(body),
				});
				var data = await res.json().catch(function () { return {}; });
				if (!res.ok) {
					msg.textContent = data.error || 'Registration failed';
					return;
				}
				window.location.href = '/dashboard';
			} catch (err) {
				msg.textContent = 'Network error';
			} finally {
				submit.disabled = false;
			}
		});
	})();
	</script>
</body>
</html>
